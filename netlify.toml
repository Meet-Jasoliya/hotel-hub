[build]
  functions = "netlify/functions"
  command = "pip install -r requirements.txt"

[functions]
  included_files = ["app.py", "auth.py", "customer.py", "hoteladmin.py", "superadmin.py", "models.py", "hotelhub.db", "templates/**", "static/**", "seed.py", "Demo Users.txt"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
